<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <style>
    @font-face {
      font-family: 'NotoSansJP';
      src: url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP&amp;display=swap');
    }
    text {
      font-family: 'NotoSansJP', sans-serif;
      font-size: 14px;
    }
    .title {
      font-size: 20px;
      font-weight: bold;
    }
    .component {
      fill: #e6f2ff;
      stroke: #3385ff;
      stroke-width: 2;
      rx: 10;
      ry: 10;
    }
    .subcomponent {
      fill: #f2f2f2;
      stroke: #808080;
      stroke-width: 1;
      rx: 5;
      ry: 5;
    }
    .arrow {
      stroke: #666;
      stroke-width: 2;
      marker-end: url(#arrowhead);
    }
    .management {
      fill: #ffe6cc;
      stroke: #ff9933;
      stroke-width: 2;
      rx: 10;
      ry: 10;
    }
  </style>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>
  
  <!-- タイトル -->
  <text x="400" y="30" text-anchor="middle" class="title">コンセンサスモデル全体アーキテクチャ</text>
  
  <!-- データ収集コンポーネント -->
  <rect x="100" y="80" width="180" height="100" class="component" />
  <text x="190" y="110" text-anchor="middle" font-weight="bold">データ収集コンポーネント</text>
  <rect x="110" y="120" width="160" height="25" class="subcomponent" />
  <text x="190" y="137" text-anchor="middle">データソース接続</text>
  <rect x="110" y="150" width="160" height="25" class="subcomponent" />
  <text x="190" y="167" text-anchor="middle">前処理と構造化</text>
  
  <!-- 分析コンポーネント -->
  <rect x="100" y="220" width="180" height="100" class="component" />
  <text x="190" y="250" text-anchor="middle" font-weight="bold">分析コンポーネント</text>
  <rect x="110" y="260" width="160" height="25" class="subcomponent" />
  <text x="190" y="277" text-anchor="middle">視点別データ分析</text>
  <rect x="110" y="290" width="160" height="25" class="subcomponent" />
  <text x="190" y="307" text-anchor="middle">変化点検出</text>
  
  <!-- 評価コンポーネント -->
  <rect x="320" y="150" width="180" height="100" class="component" />
  <text x="410" y="180" text-anchor="middle" font-weight="bold">評価コンポーネント</text>
  <rect x="330" y="190" width="160" height="25" class="subcomponent" />
  <text x="410" y="207" text-anchor="middle">重要度・確信度評価</text>
  <rect x="330" y="220" width="160" height="25" class="subcomponent" />
  <text x="410" y="237" text-anchor="middle">整合性評価</text>
  
  <!-- 統合コンポーネント -->
  <rect x="540" y="150" width="180" height="100" class="component" />
  <text x="630" y="180" text-anchor="middle" font-weight="bold">統合コンポーネント</text>
  <rect x="550" y="190" width="160" height="25" class="subcomponent" />
  <text x="630" y="207" text-anchor="middle">視点統合</text>
  <rect x="550" y="220" width="160" height="25" class="subcomponent" />
  <text x="630" y="237" text-anchor="middle">静止点検出</text>
  
  <!-- 出力コンポーネント -->
  <rect x="320" y="290" width="180" height="100" class="component" />
  <text x="410" y="320" text-anchor="middle" font-weight="bold">出力コンポーネント</text>
  <rect x="330" y="330" width="160" height="25" class="subcomponent" />
  <text x="410" y="347" text-anchor="middle">インサイト生成</text>
  <rect x="330" y="360" width="160" height="25" class="subcomponent" />
  <text x="410" y="377" text-anchor="middle">可視化</text>
  
  <!-- 管理コンポーネント -->
  <rect x="320" y="430" width="180" height="100" class="management" />
  <text x="410" y="460" text-anchor="middle" font-weight="bold">管理コンポーネント</text>
  <rect x="330" y="470" width="160" height="25" class="subcomponent" />
  <text x="410" y="487" text-anchor="middle">パラメータ管理</text>
  <rect x="330" y="500" width="160" height="25" class="subcomponent" />
  <text x="410" y="517" text-anchor="middle">モデル評価と最適化</text>
  
  <!-- 接続線 -->
  <!-- データ収集 → 分析 -->
  <path d="M190,180 L190,220" class="arrow" />
  
  <!-- 分析 → 評価 -->
  <path d="M280,270 L320,200" class="arrow" />
  
  <!-- 評価 → 統合 -->
  <path d="M500,200 L540,200" class="arrow" />
  
  <!-- 統合 → 出力 -->
  <path d="M630,250 L630,340 L500,340" class="arrow" />
  
  <!-- 管理 → 各コンポーネント -->
  <path d="M410,430 L410,390" class="arrow" />
  <path d="M320,480 L190,320 L190,180" class="arrow" stroke-dasharray="5,5" />
  <path d="M500,480 L630,250" class="arrow" stroke-dasharray="5,5" />
  
  <!-- 凡例 -->
  <rect x="620" y="430" width="20" height="20" class="component" />
  <text x="645" y="445">処理コンポーネント</text>
  
  <rect x="620" y="460" width="20" height="20" class="management" />
  <text x="645" y="475">管理コンポーネント</text>
  
  <line x1="620" y1="490" x2="640" y2="490" class="arrow" />
  <text x="645" y="495">データフロー</text>
  
  <line x1="620" y1="510" x2="640" y2="510" class="arrow" stroke-dasharray="5,5" />
  <text x="645" y="515">制御フロー</text>
</svg>
